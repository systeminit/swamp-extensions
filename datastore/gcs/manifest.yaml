manifestVersion: 1
name: "@swamp/gcs-datastore"
version: "2026.04.28.2"
description: |
  Store data in a Google Cloud Storage bucket with local cache synchronization.
  Provides distributed locking via GCS generation-based preconditions and
  bidirectional sync between a local cache directory and GCS.
  
  ## Authentication
  
  Uses Google Cloud Application Default Credentials (ADC) — no credentials in
  config. Provide credentials via one of:
  - Environment variable: `GOOGLE_APPLICATION_CREDENTIALS` pointing to a
    service account key JSON file
  - User credentials: `gcloud auth application-default login`
  - Attached service account on GCE, Cloud Run, or GKE
  
  ## Required IAM Permissions
  
  - `storage.buckets.get`
  - `storage.objects.create`
  - `storage.objects.get`
  - `storage.objects.delete`
  - `storage.objects.list`
  
  The predefined role `roles/storage.objectAdmin` covers all of these.
  
  ## Usage
  
  ```bash
  swamp datastore setup @swamp/gcs-datastore \
    --config '{"bucket": "my-bucket", "prefix": "swamp"}' --json
  ```
repository: "https://github.com/systeminit/swamp-extensions"
datastores:
  - gcs.ts
additionalFiles:
  - LICENSE.txt
  - README.md
platforms: []
labels:
  - datastore
  - gcp
  - gcs
  - storage
