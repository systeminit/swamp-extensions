manifestVersion: 1
name: "@swamp/s3-datastore"
version: "2026.04.20.1"
description: |
  Store data in an Amazon S3 bucket with local cache synchronization.
  Provides distributed locking via S3 conditional writes and bidirectional
  sync between a local cache directory and S3.

  ## Authentication

  Uses the default AWS credential chain — no credentials in config. Provide
  credentials via one of:
  - Environment variables: `AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`
  - AWS profile: `~/.aws/credentials`
  - IAM role attached to the instance or task

  ## Required IAM Permissions

  - `s3:HeadBucket`
  - `s3:GetObject`
  - `s3:PutObject`
  - `s3:DeleteObject`
  - `s3:ListBucket`
  - `s3:HeadObject`

  ## Usage

  ```bash
  swamp datastore setup @swamp/s3-datastore \
    --config '{"bucket": "my-bucket", "prefix": "swamp", "region": "us-east-1"}' --json
  ```

  ## S3-Compatible Endpoints

  Supports S3-compatible services (MinIO, DigitalOcean Spaces, etc.) via the
  `endpoint` and `forcePathStyle` config options.
repository: "https://github.com/systeminit/swamp-extensions"
datastores:
  - s3.ts
labels:
  - datastore
  - aws
  - s3
  - storage
