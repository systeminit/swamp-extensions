manifestVersion: 1
name: "@swamp/issue-lifecycle"
version: "2026.04.20.1"
description: |
  Interactive triage and implementation planning for swamp-club lab issues.
  Drives the triage/plan/iterate/approve/implement loop as a local
  conversation with Claude, while posting structured lifecycle entries and
  status transitions back to the swamp-club issue on every step.

  The model operates directly on swamp-club lab issue numbers вЂ” the issue
  must already exist in swamp-club before you start. There is no GitHub
  integration.

  ## State Machine

  ```
  created в”Ђв”Ђ[start]в”Ђв”Ђ> triaging
  triaging в”Ђв”Ђ[triage]в”Ђв”Ђ> classified
  classified в”Ђв”Ђ[plan]в”Ђв”Ђ> plan_generated
  plan_generated в”Ђв”Ђ[iterate]в”Ђв”Ђ> plan_generated  (feedback loop)
  plan_generated в”Ђв”Ђ[approve]в”Ђв”Ђ> approved
  approved в”Ђв”Ђ[implement]в”Ђв”Ђ> implementing
  implementing в”Ђв”Ђ[link_pr]в”Ђв”Ђ> pr_open
  pr_open в”Ђв”Ђ[link_pr]в”Ђв”Ђ> pr_open  (idempotent re-link)
  pr_open в”Ђв”Ђ[complete]в”Ђв”Ђ> done
  implementing в”Ђв”Ђ[complete]в”Ђв”Ђ> done  (legacy, no PR linked)
  ```

  Pre-flight checks enforce valid transitions: you cannot approve without a
  plan, cannot implement without approval, and cannot approve while critical
  or high adversarial findings remain unresolved. `complete` accepts both
  `implementing` and `pr_open` as source phases so legacy records (created
  before `link_pr` existed) can still reach `done`.

  ## Methods

  - `start` вЂ” fetch issue context from swamp-club (fails if the issue does
    not exist)
  - `triage` вЂ” classify as bug/feature/security and PATCH the swamp-club
    issue type
  - `plan` вЂ” generate an implementation plan
  - `review` вЂ” display the current plan (read-only)
  - `iterate` вЂ” revise the plan with feedback (versioned)
  - `adversarial_review` вЂ” record adversarial review findings
  - `resolve_findings` вЂ” mark adversarial findings as resolved
  - `approve` вЂ” lock the plan and transition to in_progress
  - `implement` вЂ” signal implementation has started
  - `link_pr` вЂ” link an opaque pull request URL to the lifecycle record
    (idempotent; transitions to `pr_open`). Git-host agnostic вЂ” the model
    persists whatever URL the agent supplies without fetching anything.
  - `complete` вЂ” mark the lifecycle done

  ## Data

  All resources are versioned and immutable: `state`, `context`,
  `classification`, `plan`, `feedback`, `adversarialReview`, `pullRequest`.

  ## Prerequisites

  - swamp initialized in the repository (`swamp init`)
  - `SWAMP_API_KEY` env var (or `swamp auth login`) for swamp-club access
  - The target lab issue must already exist in swamp-club

