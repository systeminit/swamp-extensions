manifestVersion: 1
name: "@swamp/issue-lifecycle"
version: "2026.04.22.2"
description: |
  Interactive triage and implementation planning for swamp-club lab issues.
  Drives the triage/plan/iterate/approve/implement loop as a local
  conversation with Claude, while posting structured lifecycle entries and
  status transitions back to the swamp-club issue on every step.

  The model operates directly on swamp-club lab issue numbers ‚Äî the issue
  must already exist in swamp-club before you start. There is no GitHub
  integration.

  ## State Machine

  ```
  created ‚îÄ‚îÄ[start]‚îÄ‚îÄ> triaging
  triaging ‚îÄ‚îÄ[triage]‚îÄ‚îÄ> classified
  classified ‚îÄ‚îÄ[plan]‚îÄ‚îÄ> plan_generated
  plan_generated ‚îÄ‚îÄ[iterate]‚îÄ‚îÄ> plan_generated  (feedback loop)
  plan_generated ‚îÄ‚îÄ[approve]‚îÄ‚îÄ> approved
  approved ‚îÄ‚îÄ[implement]‚îÄ‚îÄ> implementing
  implementing ‚îÄ‚îÄ[link_pr]‚îÄ‚îÄ> pr_open
  pr_open ‚îÄ‚îÄ[link_pr]‚îÄ‚îÄ> pr_open  (idempotent re-link)
  pr_open ‚îÄ‚îÄ[complete]‚îÄ‚îÄ> done
  implementing ‚îÄ‚îÄ[complete]‚îÄ‚îÄ> done  (legacy, no PR linked)
  ```

  Pre-flight checks enforce valid transitions: you cannot approve without a
  plan, cannot implement without approval, and cannot approve while critical
  or high adversarial findings remain unresolved. `complete` accepts both
  `implementing` and `pr_open` as source phases so legacy records (created
  before `link_pr` existed) can still reach `done`.

  ## Methods

  - `start` ‚Äî fetch issue context from swamp-club (fails if the issue does
    not exist)
  - `triage` ‚Äî classify as bug/feature/security and PATCH the swamp-club
    issue type
  - `plan` ‚Äî generate an implementation plan
  - `review` ‚Äî display the current plan (read-only)
  - `iterate` ‚Äî revise the plan with feedback (versioned)
  - `adversarial_review` ‚Äî record adversarial review findings
  - `resolve_findings` ‚Äî mark adversarial findings as resolved
  - `approve` ‚Äî lock the plan and transition to in_progress
  - `implement` ‚Äî signal implementation has started
  - `link_pr` ‚Äî link an opaque pull request URL to the lifecycle record
    (idempotent; transitions to `pr_open`). Git-host agnostic ‚Äî the model
    persists whatever URL the agent supplies without fetching anything.
  - `complete` ‚Äî mark the lifecycle done

  ## Data

  All resources are versioned and immutable: `state`, `context`,
  `classification`, `plan`, `feedback`, `adversarialReview`, `pullRequest`.

  ## Prerequisites

  - swamp initialized in the repository (`swamp init`)
  - `SWAMP_API_KEY` env var (or `swamp auth login`) for swamp-club access
  - The target lab issue must already exist in swamp-club

