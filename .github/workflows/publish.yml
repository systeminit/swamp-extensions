name: Publish Extensions

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    name: Detect changed extensions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      chunks: ${{ steps.changes.outputs.chunks }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: changes
        name: Find changed manifests and chunk for publishing
        run: |
          EXTENSIONS="[]"

          # --diff-filter=d excludes deleted paths. Without this, when a
          # service is removed from the repo (e.g. CF drops a resource and the
          # codegen prunes the service dir) its manifest.yaml shows up in the
          # diff and the publish loop later fails with `cd: no such file or
          # directory` trying to enter the deleted directory.
          for manifest in $(git diff --name-only --diff-filter=d HEAD~1 HEAD -- '*/manifest.yaml'); do
            dir=$(dirname "$manifest")
            EXTENSIONS=$(echo "$EXTENSIONS" | jq -c --arg d "$dir" '. + [$d]')
            echo "Changed: ${dir}"
          done

          COUNT=$(echo "$EXTENSIONS" | jq 'length')
          echo "Total changed extensions: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "chunks=[]" >> "$GITHUB_OUTPUT"
          else
            # Split into chunks of 50 to stay under GitHub's 256 matrix limit
            CHUNKS=$(echo "$EXTENSIONS" | jq -c '[range(0; length; 50) as $i | .[$i:$i+50]]')
            CHUNK_COUNT=$(echo "$CHUNKS" | jq 'length')
            echo "Chunks: $CHUNK_COUNT (up to 50 extensions each)"
            echo "chunks=$CHUNKS" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish chunk ${{ strategy.job-index }}
    needs: detect-changes
    if: needs.detect-changes.outputs.chunks != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.detect-changes.outputs.chunks) }}
    steps:
      - uses: actions/checkout@v6
      - uses: systeminit/setup-swamp@v0.1.0
        with:
          api-key: ${{ secrets.SWAMP_API_KEY }}
      - name: Publish extensions
        env:
          CHUNK: ${{ toJson(matrix.chunk) }}
        run: |
          TOTAL=$(echo "$CHUNK" | jq 'length')
          PUBLISHED=0
          SKIPPED=0
          FAILED=0
          SUMMARY=""

          for dir in $(echo "$CHUNK" | jq -r '.[]'); do
            cd "$GITHUB_WORKSPACE/$dir"

            NAME=$(grep '^name:' manifest.yaml | sed 's/name: *"\(.*\)"/\1/')
            LOCAL=$(grep '^version:' manifest.yaml | sed 's/version: *"\(.*\)"/\1/')
            UPSTREAM=$(swamp extension version "$NAME" --json 2>/dev/null | jq -r '.currentPublished // empty' || true)

            if [ "$LOCAL" = "$UPSTREAM" ]; then
              echo "skip: $NAME ($LOCAL) already published"
              SKIPPED=$((SKIPPED + 1))
              SUMMARY="${SUMMARY}| ${NAME} | ${LOCAL} | Skipped (already published) | - |\n"
              continue
            fi

            # Ensure a swamp repo marker exists (auto-generated model
            # directories don't have .swamp.yaml committed)
            if [ ! -f .swamp.yaml ]; then
              swamp repo init --quiet --tool none
            fi

            echo "Publishing $NAME ($LOCAL)..."
            PUSH_OUTPUT=$(swamp extension push manifest.yaml --yes 2>&1) && PUSH_EXIT=0 || PUSH_EXIT=$?
            if [ "$PUSH_EXIT" -eq 0 ]; then
              PUBLISHED=$((PUBLISHED + 1))
              SUMMARY="${SUMMARY}| ${NAME} | ${LOCAL} | Published | - |\n"
            else
              # Extract the actual error reason from swamp output
              ERROR_REASON=$(echo "$PUSH_OUTPUT" | grep -E '(ERR|FTL|Error:)' | head -3 | sed 's/.*ERR [^ ]* *//' | sed 's/.*FTL [^ ]* *//' | tr '\n' ' ')
              echo "$PUSH_OUTPUT"
              echo "::error::Failed to publish $NAME ($LOCAL): $ERROR_REASON"
              FAILED=$((FAILED + 1))
              SUMMARY="${SUMMARY}| ${NAME} | ${LOCAL} | **Failed** | ${ERROR_REASON} |\n"
            fi

            # Rate limit when publishing multiple extensions
            if [ "$TOTAL" -gt 1 ]; then
              sleep 1
            fi
          done

          echo ""
          echo "Results: $PUBLISHED published, $SKIPPED skipped, $FAILED failed (of $TOTAL total)"

          # Write job summary
          {
            echo "## Publish Results"
            echo ""
            echo "| Extension | Version | Status | Error |"
            echo "|-----------|---------|--------|-------|"
            echo -e "$SUMMARY"
            echo ""
            echo "**Total:** $PUBLISHED published, $SKIPPED skipped, $FAILED failed (of $TOTAL)"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAILED" -gt 0 ]; then
            exit 1
          fi
