name: Publish Extensions

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    name: Detect changed extensions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      extensions: ${{ steps.changes.outputs.extensions }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: changes
        name: Find changed manifests
        run: |
          EXTENSIONS="[]"

          for manifest in $(git diff --name-only HEAD~1 HEAD -- '*/manifest.yaml'); do
            dir=$(dirname "$manifest")
            EXTENSIONS=$(echo "$EXTENSIONS" | jq -c --arg d "$dir" '. + [$d]')
            echo "Changed: ${dir}"
          done

          echo "extensions=$EXTENSIONS" >> "$GITHUB_OUTPUT"
          echo "Extensions to publish: $EXTENSIONS"

  publish:
    name: Publish ${{ matrix.extension }}
    needs: detect-changes
    if: needs.detect-changes.outputs.extensions != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        extension: ${{ fromJson(needs.detect-changes.outputs.extensions) }}
    steps:
      - uses: actions/checkout@v6
      - uses: systeminit/setup-swamp@v0.1.0
        with:
          api-key: ${{ secrets.SWAMP_API_KEY }}
      - name: Publish extension
        working-directory: ${{ matrix.extension }}
        run: |
          NAME=$(grep '^name:' manifest.yaml | sed 's/name: *"\(.*\)"/\1/')
          LOCAL=$(grep '^version:' manifest.yaml | sed 's/version: *"\(.*\)"/\1/')
          UPSTREAM=$(swamp extension version "$NAME" --json 2>/dev/null | jq -r '.currentPublished // empty' || true)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "Version $LOCAL already published — skipping"
            exit 0
          fi

          # Ensure a swamp repo exists (model extensions don't have .swamp/)
          if [ ! -d .swamp ]; then
            swamp repo init --quiet --tool none
          fi

          echo "Publishing $NAME ($LOCAL)"
          swamp extension push manifest.yaml

          # Rate limit when many extensions change at once (e.g. AWS regeneration)
          TOTAL=${{ strategy.job-total }}
          if [ "$TOTAL" -gt 10 ]; then
            sleep 1
          fi
